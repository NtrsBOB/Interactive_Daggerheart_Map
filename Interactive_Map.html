  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #1a1a1a;
      color: #e0e0e0;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem 0.75rem;
      background: #252525;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
    }

    .toolbar button {
      padding: 0.4rem 0.75rem;
      border: 1px solid #444;
      background: #333;
      color: #e0e0e0;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .toolbar button:hover {
      background: #404040;
    }

    .toolbar button.active {
      background: #4a3a6a;
      border-color: #6b5b8a;
    }

    .toolbar button.help-btn {
      font-size: 1.1rem;
      font-weight: bold;
      padding: 0.35rem 0.6rem;
      line-height: 1;
    }

    .main {
      flex: 1;
      display: flex;
      min-height: 0;
      position: relative;
    }

    .map-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      cursor: grab;
    }

    .map-wrap.panning {
      cursor: grabbing;
    }

    .map-wrap.add-pin {
      cursor: crosshair;
    }

    .map-inner {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      transform-origin: center center;
      will-change: transform;
    }

    .map-inner .map-image-wrap {
      position: relative;
      display: inline-block;
    }

    .map-inner img {
      max-width: none;
      height: auto;
      display: block;
      pointer-events: none;
      user-select: none;
    }

    #markers {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #markers .marker {
      pointer-events: auto;
    }

    .map-polylines {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .map-polylines .polyline {
      pointer-events: auto;
      cursor: pointer;
      fill: none;
      stroke: rgba(255, 255, 255, 0.4);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0;
      filter: url(#line-glow);
      transition: opacity 0.2s, stroke 0.2s;
    }

    .map-polylines .polyline:hover,
    .map-polylines .polyline.highlight {
      opacity: 1;
      stroke: rgba(255, 255, 255, 0.55);
    }

    .marker {
      position: absolute;
      width: 44px;
      height: 44px;
      margin-left: -22px;
      margin-top: -22px;
      background: transparent;
      border: 2px solid transparent;
      border-radius: 50%;
      cursor: pointer;
      z-index: 2;
      opacity: 0;
      transition: opacity 0.2s, background 0.2s, border-color 0.2s;
    }

    .marker:hover,
    .marker.highlight {
      opacity: 1;
      background: rgba(200, 68, 68, 0.25);
      border-color: rgba(255, 255, 255, 0.85);
      box-shadow: 0 0 6px 1px rgba(255, 255, 255, 0.5), 0 0 14px 3px rgba(255, 255, 255, 0.25);
    }

    .marker.custom {
      opacity: 1;
      background: rgba(200, 68, 68, 0.65);
      border-color: rgba(255, 255, 255, 0.85);
      box-shadow: 0 0 6px 1px rgba(255, 255, 255, 0.5), 0 0 14px 3px rgba(255, 255, 255, 0.25);
    }

    .marker.custom:hover,
    .marker.custom.highlight {
      background: rgba(200, 68, 68, 0.85);
      border-color: #fff;
      box-shadow: 0 0 8px 2px rgba(255, 255, 255, 0.7), 0 0 18px 4px rgba(255, 255, 255, 0.35);
    }

    .marker.hidden {
      display: none;
    }

    .panel {
      width: 320px;
      min-width: 280px;
      display: flex;
      flex-direction: column;
      background: #252525;
      border-left: 1px solid #333;
      flex-shrink: 0;
    }

    .panel h2 {
      margin: 0;
      padding: 0.6rem 0.75rem;
      font-size: 0.95rem;
      font-weight: 600;
      color: #b8a0d0;
      border-bottom: 1px solid #333;
    }

    .location-list {
      overflow-y: auto;
      flex: 1;
      padding: 0.25rem 0;
    }

    .location-list summary {
      padding: 0.35rem 0.75rem;
      cursor: pointer;
      font-size: 0.85rem;
      color: #aaa;
    }

    .location-list details {
      border-bottom: 1px solid #2a2a2a;
    }

    .location-list details[open] summary {
      color: #b8a0d0;
    }

    .location-item {
      padding: 0.4rem 0.75rem 0.4rem 1.25rem;
      cursor: pointer;
      font-size: 0.9rem;
      border-left: 3px solid transparent;
    }

    .location-item:hover {
      background: #2a2a2a;
    }

    .location-item.selected {
      background: #2a2440;
      border-left-color: #8b7aa8;
    }

    .detail-panel {
      width: 300px;
      min-width: 260px;
      display: flex;
      flex-direction: column;
      background: #252525;
      border-left: 1px solid #333;
      flex-shrink: 0;

    .detail-panel .detail-header {

      padding: 0.35rem 0.5rem;

    .detail-panel .detail-header {

    }

    .detail-panel .detail-close:hover {

    }

    .detail-panel .detail-body {

      overflow-y: auto;
      flex: 1;
      min-height: 0;

      font-size: 0.9rem;
    }

    .detail-panel .detail-body h3 {

      font-size: 0.9rem;
      line-height: 1.5;
      color: #b0b0b0;

    .detail-panel .remove-pin-btn:hover {

    .pin-tooltip {

      background: none;
      color: #e8e0d4;
      font-family: "Cinzel", "Times New Roman", serif;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      pointer-events: none;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.15s;
      white-space: nowrap;
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;

    .pin-tooltip.visible {
      opacity: 1;
    }

    .distance-legend {

      bottom: 12px;
      left: 12px;
      z-index: 3;
      background: rgba(20, 20, 25, 0.85);
      border: 1px solid #444;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 0.75rem;
      color: #b0b0b0;

    .distance-legend .legend-title {
      margin-bottom: 4px;
      color: #b8a0d0;
      font-weight: 600;
    }

    .distance-legend .legend-bar-wrap {
      height: 6px;
      background: #333;
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 2px;

    .distance-legend .legend-bar {

      justify-content: space-between;
      font-size: 0.7rem;
      color: #888;

    .map-wrap.measure-mode {

      left: 0;

      height: 100%;

      stroke: #fff;
      stroke-width: 1.5;

    .measure-tooltip {
      position: absolute;
      left: 0;
      top: 0;
      padding: 0.35rem 0.6rem;
      background: rgba(20, 20, 25, 0.95);
      border: 1px solid #6b5b8a;
      border-radius: 4px;
      font-size: 0.85rem;
      color: #e0e0e0;
      white-space: nowrap;
      pointer-events: none;
      z-index: 10;

    // Parser logic kept in sync with convert.html and build.js (locations.md → LOCATIONS).
    function parseLocationsMd(text) {
      const lines = text.trim().split(/\r?\n/);
      const result = [];
      let current = null;
      let category = "";
      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        const h3 = line.match(/^### (.+)$/);
        const h2 = line.match(/^## (.+)$/);
        const pos = line.match(/^Position:\s*(\d+)\s*,\s*(\d+)/i);
        if (h2) {
          const cat = h2[1].replace(/\s*\([^)]*\)\s*$/, "").trim();
          if (cat && !cat.toLowerCase().startsWith("map legend")) category = cat;
        }
        if (h3) {
          if (current && (current.name || current.description)) {
            current.description = (current.description || "").trim();
            if (current.positions && current.positions.length === 1) {
              current.x = current.positions[0][0];
              current.y = current.positions[0][1];
            } else if (current.positions && current.positions.length > 1) {
              current.points = current.positions;
              current.x = 0;
              current.y = 0;
            }
            delete current.positions;
            if (current.name) result.push(current);
          }
          current = { name: h3[1].trim(), category: category || "Other", x: 0, y: 0, description: "", positions: [] };
        } else if (pos && current) {
          current.positions.push([parseInt(pos[1], 10), parseInt(pos[2], 10)]);
        } else if (current && line.trim() && !line.startsWith("#") && !line.startsWith("---")) {
          if (current.description) current.description += "\n";
          current.description += line.trim();
        }
      }
      if (current && (current.name || current.description)) {
        current.description = (current.description || "").trim();
        if (current.positions && current.positions.length === 1) {
          current.x = current.positions[0][0];
          current.y = current.positions[0][1];
        } else if (current.positions && current.positions.length > 1) {
          current.points = current.positions;
          current.x = 0;
          current.y = 0;
        }
        delete current.positions;
        if (current.name) result.push(current);
      }
      return result;
    }

    function setLocations(data) {
      LOCATIONS = data;
      renderLocationList();
      renderMarkers();
    }

    function removeCustomPin(index) {
      customPins.splice(index, 1);
      saveCustomPins();
      renderMarkers();
      renderLocationList();
      closeDetail();
    }

    const STORAGE_KEY = "daggerheart_custom_pins";
    // Distance scale: Sanji to To'Acar ≈ 24 miles (baseline)
    const SANJI_TO_TOAKAR_MILES = 24;
    const SANJI_X = 864, SANJI_Y = 542, TOAKAR_X = 980, TOAKAR_Y = 607;
    const BASELINE_PIXELS = Math.hypot(TOAKAR_X - SANJI_X, TOAKAR_Y - SANJI_Y);
    const MILES_PER_PIXEL = SANJI_TO_TOAKAR_MILES / BASELINE_PIXELS;

    let scale = 1, translateX = 0, translateY = 0;
    let isPanning = false, startX, startY, startTx, startTy;
    let addPinMode = false;
    let measureMode = false;
    let measureFirst = null;
    let measureLabels = null;
    let measureAwaitingClear = false;
    let customPins = [];

    function loadCustomPins() {
      try {
        const s = localStorage.getItem(STORAGE_KEY);
        if (s) customPins = JSON.parse(s);
      } catch (_) { customPins = []; }
    }
    function saveCustomPins() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(customPins));
    }

    const mapWrap = document.getElementById("mapWrap");
    const mapInner = document.getElementById("mapInner");
    const mapImg = document.getElementById("mapImg");
    const markersEl = document.getElementById("markers");
    const locationList = document.getElementById("locationList");
    const detailPanel = document.getElementById("detailPanel");
    const detailBody = document.getElementById("detailBody");
    const addPinBtn = document.getElementById("addPinBtn");
    const pinHint = document.getElementById("pinHint");
    const pinTooltip = document.getElementById("pinTooltip");
    const selectionTooltip = document.getElementById("selectionTooltip");
    let tooltipPin = null;
    let tooltipFromSelection = false;

    mapWrap.addEventListener("mouseover", (e) => {
      const pin = e.target.closest(".marker") || e.target.closest(".polyline");
      if (measureMode && pin && pin.classList.contains("marker")) return;
      if (pin) {
        tooltipPin = pin;
        const name = pin.getAttribute("data-name") || "";
        if (name) {
          pinTooltip.textContent = name;
          pinTooltip.setAttribute("aria-hidden", "false");
          const rect = pin.getBoundingClientRect ? pin.getBoundingClientRect() : null;
          if (rect) {
            pinTooltip.style.left = (rect.left + rect.width / 2) + "px";
            pinTooltip.style.top = (rect.top - 4) + "px";
            pinTooltip.style.transform = "translate(-50%, -100%)";
          } else {
            pinTooltip.style.left = e.clientX + "px";
            pinTooltip.style.top = (e.clientY - 8) + "px";
            pinTooltip.style.transform = "translate(-50%, -100%)";
          }
          pinTooltip.classList.add("visible");
        }
      }
    });
    mapWrap.addEventListener("mouseout", (e) => {
      if (tooltipPin && (e.target === tooltipPin || tooltipPin.contains(e.target)) && (!e.relatedTarget || (e.relatedTarget !== tooltipPin && !tooltipPin.contains(e.relatedTarget)))) {
        tooltipPin = null;
        if (!tooltipFromSelection) {
          pinTooltip.classList.remove("visible");
          pinTooltip.setAttribute("aria-hidden", "true");
        }
      }
    });

    function applyTransform() {
      mapInner.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
      if (tooltipFromSelection && !measureLabels) refreshSelectionTooltip();
      if (measureLabels) updateMeasureLabelsPosition();
    }

    function fitMapToWindow() {
      const nw = mapImg.naturalWidth || 1;
      const nh = mapImg.naturalHeight || 1;
      if (nw <= 0 || nh <= 0) return;
      const wrapW = mapWrap.clientWidth;
      const wrapH = mapWrap.clientHeight;
      if (wrapW <= 0 || wrapH <= 0) return;
      const fitScale = Math.min(wrapW / nw, wrapH / nh);
      scale = Math.max(0.3, Math.min(4, fitScale));
      translateX = 0;
      translateY = 0;
      applyTransform();
    }

    let currentSelection = null;

    function showSelectionTooltipAt(name, element) {
      if (!name || !element) return;
      tooltipFromSelection = true;
      selectionTooltip.textContent = name;
      selectionTooltip.setAttribute("aria-hidden", "false");
      const rect = element.getBoundingClientRect ? element.getBoundingClientRect() : null;
      if (rect) {
        selectionTooltip.style.left = (rect.left + rect.width / 2) + "px";
        selectionTooltip.style.top = (rect.top - 4) + "px";
        selectionTooltip.style.transform = "translate(-50%, -100%)";
      }
      selectionTooltip.classList.add("visible");
    }
    function refreshSelectionTooltip() {
      if (!currentSelection) return;
      const name = currentSelection.name;
      let mapEl = null;
      if (!currentSelection.isCustom) {
        mapEl = document.querySelector(`#markers .marker[data-name="${escapeAttr(name)}"]`) || document.querySelector(`#mapPolylines .polyline[data-name="${escapeAttr(name)}"]`);
      } else if (typeof currentSelection.customIndex === "number") {
        mapEl = document.querySelector(`#markers .marker.custom[data-pin-index="${currentSelection.customIndex}"]`);
      }
      if (mapEl) showSelectionTooltipAt(name, mapEl);
    }
    function hideTooltip() {
      tooltipFromSelection = false;
      selectionTooltip.classList.remove("visible");
      selectionTooltip.setAttribute("aria-hidden", "true");
    }

    function updateMeasureLabelsPosition() {
      if (!measureLabels) return;
      const wrap = mapImg.closest(".map-image-wrap");
      if (!wrap) return;
      const rect = wrap.getBoundingClientRect();
      const toViewport = (pctX, pctY) => ({
        x: rect.left + (pctX / 100) * rect.width,
        y: rect.top + (pctY / 100) * rect.height
      });
      const positionTooltipAtElement = (tooltipEl, name, element) => {
        if (!name || !element) return;
        const r = element.getBoundingClientRect ? element.getBoundingClientRect() : null;
        if (r) {
          tooltipEl.textContent = name;
          tooltipEl.style.left = (r.left + r.width / 2) + "px";
          tooltipEl.style.top = (r.top - 4) + "px";
          tooltipEl.style.transform = "translate(-50%, -100%)";
          tooltipEl.classList.add("visible");
          tooltipEl.setAttribute("aria-hidden", "false");
        }
      };
      const positionTooltipAtCoords = (tooltipEl, name, pctX, pctY) => {
        if (!name) return;
        const pos = toViewport(pctX, pctY);
        tooltipEl.textContent = name;
        tooltipEl.style.left = pos.x + "px";
        tooltipEl.style.top = (pos.y - 4) + "px";
        tooltipEl.style.transform = "translate(-50%, -100%)";
        tooltipEl.classList.add("visible");
        tooltipEl.setAttribute("aria-hidden", "false");
      };
      if (measureLabels.one && measureLabels.one.name) {
        pinTooltip.classList.remove("visible");
        if (measureLabels.one.element) {
          showSelectionTooltipAt(measureLabels.one.name, measureLabels.one.element);
        } else {
          selectionTooltip.textContent = measureLabels.one.name;
          selectionTooltip.style.left = toViewport(measureLabels.one.pctX, measureLabels.one.pctY).x + "px";
          selectionTooltip.style.top = (toViewport(measureLabels.one.pctX, measureLabels.one.pctY).y - 4) + "px";
          selectionTooltip.style.transform = "translate(-50%, -100%)";
          selectionTooltip.classList.add("visible");
          selectionTooltip.setAttribute("aria-hidden", "false");
        }
        tooltipFromSelection = true;
      }
      if (measureLabels.two) {
        const [first, second] = measureLabels.two;
        if (first && first.name) {
          if (first.element) {
            showSelectionTooltipAt(first.name, first.element);
          } else {
            positionTooltipAtCoords(selectionTooltip, first.name, first.pctX, first.pctY);
          }
          selectionTooltip.setAttribute("aria-hidden", "false");
          tooltipFromSelection = true;
        } else {
          selectionTooltip.classList.remove("visible");
        }
        if (second && second.name) {
          if (second.element) {
            positionTooltipAtElement(pinTooltip, second.name, second.element);
          } else {
            positionTooltipAtCoords(pinTooltip, second.name, second.pctX, second.pctY);
          }
        } else {
          pinTooltip.classList.remove("visible");
        }
      }
    }

    function clearMeasureLabels() {
      measureLabels = null;
      pinTooltip.classList.remove("visible");
      pinTooltip.setAttribute("aria-hidden", "true");
      if (!currentSelection) {
        selectionTooltip.classList.remove("visible");
        selectionTooltip.setAttribute("aria-hidden", "true");
        tooltipFromSelection = false;
      } else {
        refreshSelectionTooltip();
      }
    }

    function closeDetail() {
      currentSelection = null;
      detailPanel.classList.remove("open");
      detailBody.innerHTML = '<p class="placeholder">Click a location or pin to see details.</p>';
      document.querySelectorAll(".location-item").forEach(el => el.classList.remove("selected"));
      document.querySelectorAll("#markers .marker.highlight").forEach(el => el.classList.remove("highlight"));
      document.querySelectorAll("#mapPolylines .polyline.highlight").forEach(el => el.classList.remove("highlight"));
      hideTooltip();
    }

    function showDetail(name, description, isCustom, customPinIndex) {
      if (currentSelection && currentSelection.name === name && currentSelection.isCustom === isCustom) {
        closeDetail();
        return;
      }
      currentSelection = { name, description, isCustom, customIndex: customPinIndex };
      detailPanel.classList.add("open");
      const title = escapeHtml(name);
      let bodyHtml = `<h3>${title}</h3>`;
      if (description) bodyHtml += `<p>${escapeHtml(description)}</p>`;
      if (isCustom && typeof customPinIndex === "number") {
        bodyHtml += `<p><button type="button" class="remove-pin-btn" data-pin-index="${customPinIndex}">Remove pin</button></p>`;
      }
      detailBody.innerHTML = bodyHtml;
      if (isCustom) {
        const btn = detailBody.querySelector(".remove-pin-btn");
        if (btn) btn.addEventListener("click", () => removeCustomPin(customPinIndex));
      }
      document.querySelectorAll(".location-item").forEach(el => el.classList.remove("selected"));
      document.querySelectorAll("#markers .marker.highlight").forEach(el => el.classList.remove("highlight"));
      document.querySelectorAll("#mapPolylines .polyline.highlight").forEach(el => el.classList.remove("highlight"));
      if (!isCustom) {
        const item = document.querySelector(`.location-item[data-name="${escapeAttr(name)}"]`);
        if (item) item.classList.add("selected");
        const marker = document.querySelector(`#markers .marker[data-name="${escapeAttr(name)}"]`);
        if (marker) marker.classList.add("highlight");
        const polyline = document.querySelector(`#mapPolylines .polyline[data-name="${escapeAttr(name)}"]`);
        if (polyline) polyline.classList.add("highlight");
        const mapEl = marker || polyline;
        if (mapEl) showSelectionTooltipAt(name, mapEl);
        else hideTooltip();
      } else if (typeof customPinIndex === "number") {
        const m = document.querySelector(`#markers .marker.custom[data-pin-index="${customPinIndex}"]`);
        if (m) m.classList.add("highlight");
        const listItem = document.querySelector(`.location-item.custom-pin-item[data-custom-index="${customPinIndex}"]`);
        if (listItem) listItem.classList.add("selected");
        if (m) showSelectionTooltipAt(name, m);
        else hideTooltip();
      } else {
        hideTooltip();
      }
    }
    function escapeHtml(s) {
      const div = document.createElement("div");
      div.textContent = s;
      return div.innerHTML;
    }
    function escapeAttr(s) {
      return String(s).replace(/"/g, "&quot;");
    }

    function renderLocationList() {
      const byCategory = {};
      LOCATIONS.forEach(loc => {
        if (!byCategory[loc.category]) byCategory[loc.category] = [];
        byCategory[loc.category].push(loc);
      });
      const order = ["Cities", "Settlements", "Points Of Interest", "Other Places of Note"];
      const orderedCats = order.filter(cat => byCategory[cat]);
      const otherCats = Object.keys(byCategory).filter(cat => !order.includes(cat));
      const categoriesToRender = [...orderedCats, ...otherCats];
      let html = "";
      categoriesToRender.forEach(cat => {
        html += `<details open><summary>${escapeHtml(cat)}</summary>`;
        byCategory[cat].forEach(loc => {
          html += `<div class="location-item" data-name="${escapeAttr(loc.name)}" data-desc="${escapeAttr(loc.description)}">${escapeHtml(loc.name)}</div>`;
        });
        html += "</details>";
      });
      if (customPins.length > 0) {
        html += `<details open><summary>My pins</summary>`;
        customPins.forEach((pin, i) => {
          const label = pin.label || "Custom pin";
          html += `<div class="location-item custom-pin-item" data-custom-index="${i}" data-name="${escapeAttr(label)}" data-desc="${escapeAttr(pin.description || "")}">${escapeHtml(label)}</div>`;
        });
        html += "</details>";
      }
      locationList.innerHTML = html;
      locationList.querySelectorAll(".location-item").forEach(el => {
        el.addEventListener("click", () => {
          const name = el.getAttribute("data-name");
          const desc = el.getAttribute("data-desc");
          const customIdx = el.getAttribute("data-custom-index");
          if (customIdx !== null && customIdx !== "") {
            showDetail(name, desc, true, parseInt(customIdx, 10));
          } else {
            showDetail(name, desc, false);
          }
        });
      });
    }

    function renderMarkers() {
      markersEl.innerHTML = "";
      const polylinesEl = document.getElementById("mapPolylines");
      if (polylinesEl) polylinesEl.innerHTML = "";
      const hasPos = (x, y) => (x !== 0 || y !== 0);
      const nw = mapImg.naturalWidth || 1;
      const nh = mapImg.naturalHeight || 1;

      LOCATIONS.forEach((loc) => {
        if (loc.points && loc.points.length > 1) {
          const pts = loc.points.map(([px, py]) => [(px / nw * 100), (py / nh * 100)].join(",")).join(" ");
          const path = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
          path.setAttribute("points", pts);
          path.setAttribute("class", "polyline");
          path.setAttribute("data-name", loc.name);
          path.addEventListener("click", e => { e.stopPropagation(); showDetail(loc.name, loc.description, false); });
          polylinesEl.appendChild(path);
          return;
        }
        if (!hasPos(loc.x, loc.y)) return;
        const el = document.createElement("div");
        el.className = "marker";
        el.dataset.name = loc.name;
        el.style.left = (loc.x / nw * 100) + "%";
        el.style.top = (loc.y / nh * 100) + "%";
        el.addEventListener("click", e => { e.stopPropagation(); showDetail(loc.name, loc.description, false); });
        markersEl.appendChild(el);
      });

      customPins.forEach((pin, i) => {
        const el = document.createElement("div");
        el.className = "marker custom";
        el.dataset.pinIndex = i;
        el.dataset.name = pin.label || "Custom pin";
        el.style.left = pin.x + "%";
        el.style.top = pin.y + "%";
        el.dataset.index = i;
        el.addEventListener("click", e => {
          e.stopPropagation();
          showDetail(pin.label || "Custom pin", pin.description || "", true, i);
        });
        markersEl.appendChild(el);
      });
    }

    function addCustomPin(xPct, yPct) {
      const label = prompt("Label for this pin (optional):") || "Custom pin";
      customPins.push({ x: xPct, y: yPct, label, description: "" });
      saveCustomPins();
      renderLocationList();
      renderMarkers();
      showDetail(label, "", true, customPins.length - 1);
    }

    function updateDistanceLegend() {
      const nw = mapImg.naturalWidth || 0;
      const nh = mapImg.naturalHeight || 0;
      const legendBar = document.getElementById("legendBar");
      const legendMiles = document.getElementById("legendMiles");
      const distanceLegend = document.getElementById("distanceLegend");
      if (!nw || !legendBar || !distanceLegend) return;
      const barWidthPct = (BASELINE_PIXELS / nw) * 100;
      legendBar.style.width = barWidthPct + "%";
      if (legendMiles) legendMiles.textContent = SANJI_TO_TOAKAR_MILES + " mi";
      distanceLegend.setAttribute("aria-hidden", "false");
    }

    mapImg.addEventListener("load", () => {
      fitMapToWindow();
      renderMarkers();
      updateDistanceLegend();
    });

    mapWrap.addEventListener("wheel", e => {
      e.preventDefault();
      const delta = e.deltaY > 0 ? -0.15 : 0.15;
      scale = Math.max(0.3, Math.min(4, scale + delta));
      applyTransform();
    }, { passive: false });

    mapWrap.addEventListener("mousedown", e => {
      if (addPinMode || measureMode) return;
      if (e.button !== 0) return;
      if (e.target.closest(".marker") || e.target.closest(".polyline")) return;
      isPanning = true;
      startX = e.clientX;
      startY = e.clientY;
      startTx = translateX;
      startTy = translateY;
      mapWrap.classList.add("panning");
    });
    mapWrap.addEventListener("mousemove", e => {
      if (!isPanning) return;
      translateX = startTx + (e.clientX - startX);
      translateY = startTy + (e.clientY - startY);
      applyTransform();
    });
    mapWrap.addEventListener("mouseup", () => {
      isPanning = false;
      mapWrap.classList.remove("panning");
    });
    mapWrap.addEventListener("mouseleave", () => {
      isPanning = false;
      mapWrap.classList.remove("panning");
    });

    mapWrap.addEventListener("click", e => {
      if (!addPinMode) return;
      const wrap = mapImg.closest(".map-image-wrap");
      const rect = wrap.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width * 100;
      const y = (e.clientY - rect.top) / rect.height * 100;
      if (x >= 0 && x <= 100 && y >= 0 && y <= 100) addCustomPin(x, y);
    });

    document.getElementById("zoomIn").addEventListener("click", () => { scale = Math.min(4, scale + 0.25); applyTransform(); });
    document.getElementById("zoomOut").addEventListener("click", () => { scale = Math.max(0.3, scale - 0.25); applyTransform(); });
    document.getElementById("zoomReset").addEventListener("click", fitMapToWindow);

    window.addEventListener("resize", () => {
      if (mapImg.naturalWidth && mapImg.naturalHeight) {
        fitMapToWindow();
        updateDistanceLegend();
      }
    });

    addPinBtn.addEventListener("click", () => {
      addPinMode = !addPinMode;
      addPinBtn.classList.toggle("active", addPinMode);
      mapWrap.classList.toggle("add-pin", addPinMode);
      pinHint.textContent = addPinMode ? "Click on the map to place a pin." : "";
      if (addPinMode && measureMode) {
        measureMode = false;
        measureBtn.classList.remove("active");
        mapWrap.classList.remove("measure-mode");
        clearMeasureOverlay();
        pinHint.textContent = "Click on the map to place a pin.";
      }
    });

    const measureOverlayEl = document.getElementById("measureOverlay");
    const measureTooltipEl = document.getElementById("measureTooltip");

    function getMapCoordsFromEvent(e) {
      const wrap = mapImg.closest(".map-image-wrap");
      if (!wrap || !mapImg.naturalWidth || !mapImg.naturalHeight) return null;
      const rect = wrap.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width;
      const y = (e.clientY - rect.top) / rect.height;
      if (x < 0 || x > 1 || y < 0 || y > 1) return null;
      const nw = mapImg.naturalWidth;
      const nh = mapImg.naturalHeight;
      return {
        px: x * nw,
        py: y * nh,
        pctX: x * 100,
        pctY: y * 100,
        name: null
      };
    }

    function getCoordsFromPinOrPolyline(el) {
      if (!el || !mapImg.naturalWidth || !mapImg.naturalHeight) return null;
      const nw = mapImg.naturalWidth;
      const nh = mapImg.naturalHeight;
      const marker = el.closest(".marker");
      if (marker) {
        const pinIndex = marker.getAttribute("data-pin-index");
        if (pinIndex !== null && pinIndex !== "" && customPins[parseInt(pinIndex, 10)]) {
          const pin = customPins[parseInt(pinIndex, 10)];
          const pctX = pin.x;
          const pctY = pin.y;
          const name = pin.label || "Custom pin";
          return { px: (pctX / 100) * nw, py: (pctY / 100) * nh, pctX, pctY, name, element: marker };
        }
        const name = marker.getAttribute("data-name");
        const loc = LOCATIONS.find((l) => l.name === name);
        if (loc && (loc.x !== 0 || loc.y !== 0)) {
          const pctX = (loc.x / nw) * 100;
          const pctY = (loc.y / nh) * 100;
          return { px: loc.x, py: loc.y, pctX, pctY, name: name || null, element: marker };
        }
      }
      const polyline = el.closest(".polyline");
      if (polyline && polyline.getAttribute("points")) {
        const pts = polyline.getAttribute("points").trim().split(/\s+/).map((p) => {
          const [a, b] = p.split(",").map(Number);
          return [a, b];
        });
        if (pts.length) {
          const sumX = pts.reduce((s, p) => s + p[0], 0);
          const sumY = pts.reduce((s, p) => s + p[1], 0);
          const pctX = sumX / pts.length;
          const pctY = sumY / pts.length;
          const px = (pctX / 100) * nw;
          const py = (pctY / 100) * nh;
          const name = polyline.getAttribute("data-name");
          return { px, py, pctX, pctY, name: name || null, element: polyline };
        }
      }
      return null;
    }

    function clearMeasureOverlay() {
      measureFirst = null;
      measureLabels = null;
      measureAwaitingClear = false;
      if (measureOverlayEl) measureOverlayEl.innerHTML = "";
      if (measureTooltipEl) {
        measureTooltipEl.style.display = "none";
        measureTooltipEl.textContent = "";
      }
      clearMeasureLabels();
    }

    function pixelDistanceToMiles(pxDist) {
      return pxDist * MILES_PER_PIXEL;
    }

    document.getElementById("measureBtn").addEventListener("click", () => {
      measureMode = !measureMode;
      measureBtn.classList.toggle("active", measureMode);
      mapWrap.classList.toggle("measure-mode", measureMode);
      clearMeasureOverlay();
      if (measureMode) {
        pinHint.textContent = "Click two points on the map to measure distance.";
        if (addPinMode) {
          addPinMode = false;
          addPinBtn.classList.remove("active");
          mapWrap.classList.remove("add-pin");
        }
      } else {
        pinHint.textContent = "";
      }
    });

    mapWrap.addEventListener("click", (e) => {
      if (!measureMode || e.button !== 0) return;
      if (measureAwaitingClear) {
        measureOverlayEl.innerHTML = "";
        measureTooltipEl.style.display = "none";
        measureTooltipEl.textContent = "";
        measureLabels = null;
        clearMeasureLabels();
        measureAwaitingClear = false;
        pinHint.textContent = "Click two points on the map to measure distance.";
        return;
      }
      let coords = null;
      const pinOrLine = e.target.closest(".marker") || e.target.closest(".polyline");
      if (pinOrLine) {
        const isLinePin = pinOrLine.classList.contains("polyline");
        if (!isLinePin) {
          coords = getCoordsFromPinOrPolyline(pinOrLine);
          if (coords) {
            e.stopPropagation();
            e.preventDefault();
          }
        }
      }
      if (!coords) coords = getMapCoordsFromEvent(e);
      if (!coords) return;
      const nw = mapImg.naturalWidth;
      const nh = mapImg.naturalHeight;
      if (!measureFirst) {
        measureFirst = coords;
        measureOverlayEl.innerHTML = "";
        const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        circle.setAttribute("class", "measure-dot");
        circle.setAttribute("cx", coords.pctX);
        circle.setAttribute("cy", coords.pctY);
        circle.setAttribute("r", 0.8);
        measureOverlayEl.appendChild(circle);
        measureLabels = coords.name ? { one: { pctX: coords.pctX, pctY: coords.pctY, name: coords.name, element: coords.element || null } } : null;
        if (measureLabels) updateMeasureLabelsPosition();
        return;
      }
      const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
      line.setAttribute("x1", measureFirst.pctX);
      line.setAttribute("y1", measureFirst.pctY);
      line.setAttribute("x2", coords.pctX);
      line.setAttribute("y2", coords.pctY);
      measureOverlayEl.appendChild(line);
      const circle2 = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      circle2.setAttribute("class", "measure-dot");
      circle2.setAttribute("cx", coords.pctX);
      circle2.setAttribute("cy", coords.pctY);
      circle2.setAttribute("r", 0.8);
      measureOverlayEl.appendChild(circle2);
      measureLabels = {
        two: [
          { pctX: measureFirst.pctX, pctY: measureFirst.pctY, name: measureFirst.name || null, element: measureFirst.element || null },
          { pctX: coords.pctX, pctY: coords.pctY, name: coords.name || null, element: coords.element || null }
        ]
      };
      updateMeasureLabelsPosition();
      const pxDist = Math.hypot(coords.px - measureFirst.px, coords.py - measureFirst.py);
      const miles = pixelDistanceToMiles(pxDist);
      measureTooltipEl.textContent = miles >= 0.1 ? miles.toFixed(1) + " miles" : (miles * 5280).toFixed(0) + " ft";
      measureTooltipEl.style.display = "block";
      measureTooltipEl.style.left = ((measureFirst.pctX + coords.pctX) / 2) + "%";
      measureTooltipEl.style.top = ((measureFirst.pctY + coords.pctY) / 2) + "%";
      measureTooltipEl.style.transform = "translate(-50%, -100%)";
      measureFirst = null;
      measureAwaitingClear = true;
      pinHint.textContent = "Click once to start another measurement.";
    }, true);

    document.getElementById("detailClose").addEventListener("click", closeDetail);

      const w = window.open("", "_blank", "width=440,height=520,resizable=yes,scrollbars=yes");

    document.getElementById("helpBtn").addEventListener("click", openHelpWindow);

    loadCustomPins();
    renderLocationList();
    renderMarkers();
    if (mapImg.complete && mapImg.naturalWidth) {
      fitMapToWindow();
      updateDistanceLegend();
    } else {
      applyTransform();
    }

    fetch("locations.md")
      .then(r => r.ok ? r.text() : Promise.reject())
